<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gesellschaft Quiz Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
color:white;
text-align:center;
transition:0.5s;
}

.dark{
background:#121212;
}

h1{
margin-top:30px;
}

#menu{
padding:40px;
}

#quiz{
display:none;
max-width:900px;
margin:auto;
padding:20px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
}

.startBtn{
background:#2ecc71;
color:white;
}

.modeBtn{
background:#9b59b6;
color:white;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.answer{
padding:25px;
font-size:20px;
border-radius:15px;
cursor:pointer;
color:white;
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;color:black;}
.green{background:#2ecc71;}

.correct{
background:#27ae60!important;
}

.wrong{
background:#c0392b!important;
}

#question{
font-size:28px;
margin:30px;
}

#timerBar{
width:100%;
height:20px;
background:rgba(255,255,255,0.2);
border-radius:10px;
overflow:hidden;
}

#time{
height:100%;
width:100%;
background:#2ecc71;
}

#score,#level,#player{
font-size:20px;
margin-top:10px;
}

#leaderboard{
margin-top:40px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:8px 15px;
}

#achievement{
display:none;
font-size:26px;
margin-top:20px;
animation:pop 0.5s;
}

@keyframes pop{
from{transform:scale(0)}
to{transform:scale(1)}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🌍 Gesellschaft Quiz Pro</h1>

<div id="menu">

<p>Spielername:</p>
<input id="name">

<br><br>

<button class="startBtn" onclick="startGame()">Start</button>

<button class="modeBtn" onclick="toggleDark()">Dark Mode</button>

<div id="leaderboard">
<h2>🏆 Leaderboard</h2>
<table id="table">
<tr><th>Name</th><th>Punkte</th></tr>
</table>
</div>

</div>

<div id="quiz">

<div id="player"></div>

<div id="question"></div>

<div class="answers">
<button class="answer red"></button>
<button class="answer blue"></button>
<button class="answer yellow"></button>
<button class="answer green"></button>
</div>

<div id="timerBar">
<div id="time"></div>
</div>

<div id="score">Punkte: 0</div>
<div id="level">Level: 1</div>

<div id="achievement">🏅 Achievement freigeschaltet!</div>

</div>

<audio id="correctSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_ef6c0b.mp3">
</audio>

<audio id="wrongSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7f8c6a.mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

let score=0
let level=1
let current=0
let player=""

let timer
let time=10

const quiz=[

{q:"Was ist eine Gesellschaft?",a:["Gemeinschaft von Menschen","Ein Haus","Ein Auto","Ein Computer"],c:0},
{q:"Was teilen Menschen?",a:["Regeln und Werte","Nur Geld","Nur Kleidung","Nur Essen"],c:0},
{q:"Warum arbeiten Menschen zusammen?",a:["Um Bedürfnisse zu erfüllen","Zum Spaß","Ohne Grund","Nie"],c:0},
{q:"Was regelt Zusammenleben?",a:["Gesetze","Zufall","Chaos","Gar nichts"],c:0},
{q:"Was ist Kommunikation?",a:["Information austauschen","Schlafen","Essen","Rennen"],c:0},
{q:"Was haben Bürger?",a:["Rechte und Pflichten","Nur Rechte","Nur Pflichten","Nichts"],c:0}

]

quiz.sort(()=>Math.random()-0.5)

const buttons=document.querySelectorAll(".answer")

function startGame(){

player=document.getElementById("name").value

if(player===""){
alert("Name eingeben")
return
}

document.getElementById("menu").style.display="none"
document.getElementById("quiz").style.display="block"

document.getElementById("player").innerText="Spieler: "+player

loadQuestion()

}

function loadQuestion(){

if(current>=quiz.length){
finish()
return
}

let q=shuffle(quiz[current])

document.getElementById("question").innerText=q.q

buttons.forEach((b,i)=>{
b.innerText=q.a[i]
b.onclick=()=>answer(i,q.c)
})

startTimer()

}

function shuffle(question){

let arr=question.a.map((t,i)=>({text:t,correct:i===question.c}))

arr.sort(()=>Math.random()-0.5)

return{
q:question.q,
a:arr.map(a=>a.text),
c:arr.findIndex(a=>a.correct)
}

}

function startTimer(){

time=10

document.getElementById("time").style.width="100%"

timer=setInterval(()=>{

time--

document.getElementById("time").style.width=(time*10)+"%"

if(time<=0){
clearInterval(timer)
next()
}

},1000)

}

function answer(i,c){

clearInterval(timer)

if(i===c){

buttons[i].classList.add("correct")
score+=100
document.getElementById("correctSound").play()

}else{

buttons[i].classList.add("wrong")
buttons[c].classList.add("correct")
document.getElementById("wrongSound").play()

}

if(score>=500){
showAchievement()
}

setTimeout(next,800)

}

function next(){

buttons.forEach(b=>{
b.classList.remove("correct")
b.classList.remove("wrong")
})

document.getElementById("score").innerText="Punkte: "+score

if(score>=level*300){
level++
document.getElementById("level").innerText="Level: "+level
}

current++
loadQuestion()

}

function showAchievement(){

let a=document.getElementById("achievement")

a.style.display="block"

setTimeout(()=>{
a.style.display="none"
},2000)

}

function finish(){

saveScore()

document.getElementById("quiz").innerHTML=
"<h1>🏆 Gewonnen!</h1>"+
"<h2>Punkte: "+score+"</h2>"+
"<button onclick='location.reload()'>Nochmal spielen</button>"

confetti()

}

function saveScore(){

let data=JSON.parse(localStorage.getItem("scores")||"[]")

data.push({name:player,score:score})

data.sort((a,b)=>b.score-a.score)

data=data.slice(0,5)

localStorage.setItem("scores",JSON.stringify(data))

}

function loadScores(){

let data=JSON.parse(localStorage.getItem("scores")||"[]")

let table=document.getElementById("table")

data.forEach(s=>{
let row=document.createElement("tr")

row.innerHTML="<td>"+s.name+"</td><td>"+s.score+"</td>"

table.appendChild(row)
})

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<150;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:8,
speed:Math.random()*3+1
})

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"

ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height)p.y=0

})

requestAnimationFrame(update)

}

update()

}

loadScores()

</script>

</body>
</html>
