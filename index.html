<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Super Quiz</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
color:white;
text-align:center;
overflow-x:hidden;
}

#game{
margin-top:40px;
padding:20px;
}

h1{
font-size:40px;
}

#question{
font-size:28px;
margin:30px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
max-width:600px;
margin:auto;
}

.btn{
padding:30px;
font-size:28px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
transform:scale(1);
transition:all .2s;
box-shadow:0 10px 0 rgba(0,0,0,0.2);
}

.btn:hover{
transform:scale(1.05);
}

.red{background:#e21b3c;}
.blue{background:#1368ce;}
.yellow{background:#d89e00;}
.green{background:#26890c;}

.correct{
animation:correctFlash .5s 3;
}

.wrong{
animation:wrongFlash .5s 3;
}

@keyframes correctFlash{
0%{background:#00ff9d;}
50%{background:#fff;}
100%{background:#00ff9d;}
}

@keyframes wrongFlash{
0%{background:#ff0044;}
50%{background:#fff;}
100%{background:#ff0044;}
}

#score{
font-size:24px;
margin:20px;
}

#level{
font-size:20px;
}

#gift{
display:none;
font-size:80px;
cursor:pointer;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

#card{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:black;
padding:40px;
border-radius:20px;
font-size:30px;
animation:cardOpen .6s forwards;
}

@keyframes cardOpen{
to{transform:translate(-50%,-50%) scale(1);}
}

#win{
display:none;
font-size:50px;
margin-top:100px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🎮 Super Quiz</h1>

<div id="score">Punkte: 0</div>
<div id="level">Level 1</div>

<div id="game">

<div id="question"></div>

<div class="answers">
<button class="btn red" onclick="answer(0)">▲</button>
<button class="btn blue" onclick="answer(1)">■</button>
<button class="btn yellow" onclick="answer(2)">◆</button>
<button class="btn green" onclick="answer(3)">●</button>
</div>

</div>

<div id="gift" onclick="openGift()">🎁</div>

<div id="card">🎉 Du hast gut aufgepasst!</div>

<div id="win">🏆 GEWONNEN 🏆</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8c2c3c9b6b.mp3">
</audio>

<audio id="correctSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c55f7c4fd.mp3">
</audio>

<audio id="wrongSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_eb7c5b8c63.mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

document.body.onclick=()=>music.play()

const questions=[

{q:"Wie viele Kontinente gibt es?",a:["5","6","7","8"],c:2},

{q:"Hauptstadt von Deutschland?",a:["Berlin","Paris","Rom","Madrid"],c:0},

{q:"2 + 2 ?",a:["3","4","5","6"],c:1},

{q:"Größter Ozean?",a:["Atlantik","Indischer","Pazifik","Arktischer"],c:2},

{q:"Welcher Planet ist rot?",a:["Mars","Venus","Erde","Saturn"],c:0},

{q:"Schnellstes Landtier?",a:["Löwe","Tiger","Gepard","Wolf"],c:2}

]

questions.sort(()=>Math.random()-0.5)

let current=0
let score=0
let level=1

function load(){

let q=questions[current]

question.innerText=q.q

let buttons=document.querySelectorAll(".btn")

buttons.forEach((b,i)=>{
b.innerHTML=q.a[i]
b.classList.remove("correct","wrong")
})

}

function answer(i){

let q=questions[current]
let buttons=document.querySelectorAll(".btn")

if(i===q.c){

score+=200
correctSound.play()
buttons[i].classList.add("correct")

}else{

wrongSound.play()
buttons[i].classList.add("wrong")

}

scoreDisplay()

current++

if(current>=questions.length){

win()

}else{

setTimeout(load,800)

}

}

function scoreDisplay(){

score+=0

document.getElementById("score").innerText="Punkte: "+score

if(score>=level*500){

level++
document.getElementById("level").innerText="Level "+level

}

if(score>=1000){

gift.style.display="block"

}

}

function openGift(){

card.style.display="block"
gift.style.display="none"

}

function win(){

game.style.display="none"
winScreen()

}

function winScreen(){

win.style.display="block"
confetti()

}

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<200;i++){

pieces.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+4,
speed:Math.random()*3+2

})

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height){

p.y=0
p.x=Math.random()*canvas.width

}

})

requestAnimationFrame(update)

}

update()

}

load()

</script>

</body>
</html>
