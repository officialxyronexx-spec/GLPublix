<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gesellschaft Quiz</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
overflow:hidden;
}

#quiz{
margin-top:50px;
}

button{
width:200px;
height:80px;
margin:10px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#33cc33;}
.yellow{background:#ffcc00;}

.correct{
animation:correctFlash 0.5s 4;
}

.wrong{
animation:wrongFlash 0.5s 4;
}

@keyframes correctFlash{
0%{background:#33cc33;}
50%{background:white;}
100%{background:#33cc33;}
}

@keyframes wrongFlash{
0%{background:#ff4d4d;}
50%{background:black;}
100%{background:#ff4d4d;}
}

#leaderboard{
position:absolute;
right:20px;
top:20px;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:10px;
}

#gift{
display:none;
font-size:30px;
animation:pop 1s infinite alternate;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

#card{
display:none;
font-size:40px;
margin-top:30px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🎮 Gesellschaft Quiz</h1>

<div id="quiz">

<h2 id="question"></h2>

<div>

<button class="red" onclick="answer(0)">🔺</button>
<button class="blue" onclick="answer(1)">🔵</button>

<br>

<button class="green" onclick="answer(2)">🟩</button>
<button class="yellow" onclick="answer(3)">🟨</button>

</div>

</div>

<h2 id="points">Punkte: 0</h2>

<div id="gift">🎁 Geschenk öffnen</div>
<div id="card">🧠 Du hast gut aufgepasst!</div>

<div id="leaderboard">
<h3>🏆 Leaderboard</h3>
<div id="board"></div>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<canvas id="confetti"></canvas>

<script>

let players=[
{name:"Spieler 1",score:0},
{name:"Spieler 2",score:0},
{name:"Spieler 3",score:0}
]

let combo=0
let points=0
let q=0

const questions=[

{
q:"Was ist eine Gesellschaft?",
a:["Eine Gemeinschaft von Menschen","Ein Gebäude","Ein Spiel","Eine Maschine"],
c:0
},

{
q:"Was teilen Menschen in einer Gesellschaft?",
a:["Regeln und Werte","Autos","Computer","Bäume"],
c:0
},

{
q:"Wie arbeiten Menschen zusammen?",
a:["Arbeitsteilung","Gar nicht","Nur allein","Mit Robotern"],
c:0
},

{
q:"Was hilft Menschen zu reden?",
a:["Kommunikation","Stille","Schlafen","Träumen"],
c:0
},

{
q:"Welche Gruppe gibt es?",
a:["Familie","Planeten","Autos","Steine"],
c:0
},

{
q:"Was machten Menschen vor der Industrialisierung?",
a:["Landwirtschaft","Programmieren","Videos drehen","Raumfahrt"],
c:0
},

{
q:"Wer stellte Produkte in Werkstätten her?",
a:["Handwerker","Astronauten","Piloten","Lehrer"],
c:0
}

]

function showQuestion(){
document.getElementById("question").innerText=questions[q].q
}

function updateBoard(){

players[0].score=points

players.sort((a,b)=>b.score-a.score)

let html=""

players.forEach(p=>{
html+=p.name+" : "+p.score+"<br>"
})

document.getElementById("board").innerHTML=html

}

function answer(i){

if(i===questions[q].c){

document.body.classList.add("correct")

document.getElementById("correctSound").play()

combo++

points+=100+(combo*20)

}else{

document.body.classList.add("wrong")

document.getElementById("wrongSound").play()

combo=0

}

document.getElementById("points").innerText="Punkte: "+points

updateBoard()

setTimeout(()=>{
document.body.classList.remove("correct","wrong")
},800)

if(points>=1000){
document.getElementById("gift").style.display="block"
}

q++

if(q<questions.length){

setTimeout(showQuestion,800)

}else{

win()

}

}

document.getElementById("gift").onclick=function(){

this.style.display="none"

document.getElementById("card").style.display="block"

confetti()

}

function win(){

document.getElementById("question").innerText="🏆 Gewinner!"

confetti()

}

function confetti(){

let canvas=document.getElementById("confetti")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<200;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+4,
d:Math.random()*200
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let i=0;i<pieces.length;i++){

let p=pieces[i]

ctx.beginPath()

ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"

ctx.fill()

p.y+=2

if(p.y>canvas.height)p.y=0

}

requestAnimationFrame(draw)

}

draw()

}

showQuestion()
updateBoard()

</script>

</body>
</html>
