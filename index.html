<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

h1,h2,h3{
margin:20px;
}

#timer{
font-size:50px;
}

#score{
font-size:30px;
margin:10px;
}

/* Grid */

#answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
width:85%;
margin:auto;
}

/* 3D Buttons */

.answerBtn{
height:120px;
border:none;
border-radius:20px;
font-size:18px;
padding:10px;
cursor:pointer;
box-shadow:0 8px rgba(0,0,0,0.4);
transition:0.1s;
}

.answerBtn:active{
transform:translateY(6px);
box-shadow:0 2px rgba(0,0,0,0.4);
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;color:black;}
.green{background:#2ecc71;}

.correct{
animation:correctFlash 0.5s 4;
}

.wrong{
animation:wrongFlash 0.5s 4;
}

@keyframes correctFlash{
0%{background:#2ecc71}
50%{background:white}
100%{background:#2ecc71}
}

@keyframes wrongFlash{
0%{background:#e74c3c}
50%{background:white}
100%{background:#e74c3c}
}

/* Punkte Animation */

.points{
font-size:40px;
color:#f1c40f;
animation:pop 1s forwards;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1.4);opacity:1}
}

/* Geschenk */

#gift{
font-size:120px;
cursor:pointer;
}

.card{
background:white;
color:black;
padding:40px;
border-radius:20px;
width:60%;
margin:auto;
font-size:25px;
}

</style>
</head>
<body>

<div id="app"></div>

<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-success-alert-2039.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<audio id="music" src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let score=0
let currentQuestion=0
let timeLeft=15
let timer

const quiz=[

{
question:"Was versteht man unter Gesellschaft?",
answers:[
"Gemeinschaft von Menschen",
"Maschine",
"Computer",
"Armee"
],
correct:0
},

{
question:"Was teilen Menschen in einer Gesellschaft?",
answers:[
"Regeln und Werte",
"Autos",
"Roboter",
"Raketen"
],
correct:0
},

{
question:"Warum sind Menschen voneinander abhängig?",
answers:[
"Arbeit und Familie",
"Gaming",
"Sport",
"Fernsehen"
],
correct:0
},

{
question:"Wie leben Menschen zusammen?",
answers:[
"Zusammenarbeit",
"Alleine",
"Ohne Regeln",
"Ohne Kommunikation"
],
correct:0
},

{
question:"Welche soziale Gruppe gibt es?",
answers:[
"Familien",
"Aliens",
"Roboter",
"Dinosaurier"
],
correct:0
},

{
question:"Was bestimmt oft die Stellung in der Gesellschaft?",
answers:[
"Beruf",
"Auto",
"Handy",
"Spiel"
],
correct:0
},

{
question:"Wie arbeiteten Menschen vor der Industrialisierung?",
answers:[
"Landwirtschaft",
"Computer",
"Internet",
"Büro"
],
correct:0
},

{
question:"Wo lebten viele Menschen früher?",
answers:[
"Auf dem Land",
"Im Weltall",
"Unter Wasser",
"Auf dem Mond"
],
correct:0
}

]

quiz.sort(()=>Math.random()-0.5)

function startGame(){

document.getElementById("music").play()

score=0
currentQuestion=0

nextQuestion()

}

function nextQuestion(){

if(currentQuestion>=quiz.length){

endGame()
return

}

timeLeft=15

let q=quiz[currentQuestion]

document.getElementById("app").innerHTML=`

<h2>Punkte: ${score}</h2>

<div id="timer">${timeLeft}</div>

<h3>${q.question}</h3>

<div id="answers">

<button class="answerBtn red" onclick="answer(0)">▲ ${q.answers[0]}</button>
<button class="answerBtn blue" onclick="answer(1)">◆ ${q.answers[1]}</button>
<button class="answerBtn yellow" onclick="answer(2)">● ${q.answers[2]}</button>
<button class="answerBtn green" onclick="answer(3)">■ ${q.answers[3]}</button>

</div>

`

timer=setInterval(()=>{

timeLeft--

document.getElementById("timer").innerText=timeLeft

if(timeLeft<=0){

clearInterval(timer)
currentQuestion++
nextQuestion()

}

},1000)

}

function answer(index){

clearInterval(timer)

let correct=quiz[currentQuestion].correct

let buttons=document.querySelectorAll(".answerBtn")

if(index===correct){

let points=timeLeft*100
score+=points

document.getElementById("correctSound").play()

buttons[index].classList.add("correct")

document.getElementById("app").innerHTML+=`<div class="points">+${points}</div>`

}else{

document.getElementById("wrongSound").play()

buttons[index].classList.add("wrong")

}

setTimeout(()=>{

currentQuestion++
nextQuestion()

},1200)

}

function endGame(){

confetti({
particleCount:400,
spread:180
})

document.getElementById("app").innerHTML=`

<h1>Quiz beendet!</h1>

<h2>Deine Punkte: ${score}</h2>

${score>=1000?`<h2>🎁 Geschenk freigeschaltet</h2><div id="gift" onclick="openGift()">🎁</div>`:""}

<button onclick="startGame()">Neues Spiel</button>

`

}

function openGift(){

document.getElementById("app").innerHTML=`

<div class="card">

Du hast gut aufgepasst! 🧠

</div>

<button onclick="startGame()">Nochmal spielen</button>

`

}

document.getElementById("app").innerHTML=`

<h1>Gesellschaft Quiz</h1>

<button onclick="startGame()">Start</button>

`

</script>

</body>
</html>
