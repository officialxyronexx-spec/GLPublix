```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:20px;
}

#quiz{
max-width:900px;
margin:auto;
padding:20px;
}

#question{
font-size:28px;
margin:40px 0;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.answer{
padding:25px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
color:white;
transition:0.2s;
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;color:black;}
.green{background:#2ecc71;}

.correct{
background:#27ae60!important;
}

.wrong{
background:#c0392b!important;
}

#score{
font-size:24px;
margin-top:20px;
}

#level{
font-size:18px;
margin-top:10px;
}

/* WIN SCREEN */

#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
z-index:1000;
}

#trophy{
font-size:120px;
cursor:pointer;
animation:trophyRise 2s ease-out forwards;
}

@keyframes trophyRise{

0%{
transform:translateY(400px) scale(0.3);
opacity:0;
}

100%{
transform:translateY(0) scale(1);
opacity:1;
}

}

#gift{
font-size:100px;
margin-top:30px;
display:none;
cursor:pointer;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{

0%{transform:translateX(0)}
25%{transform:translateX(-10px)}
50%{transform:translateX(10px)}
75%{transform:translateX(-10px)}
100%{transform:translateX(0)}

}

#reward{
display:none;
font-size:30px;
margin-top:20px;
animation:pop 0.6s;
}

@keyframes pop{

0%{transform:scale(0)}
100%{transform:scale(1)}

}

</style>
</head>

<body>

<h1>Gesellschaft Quiz</h1>

<div id="quiz">

<div id="question"></div>

<div class="answers">
<button class="answer red"></button>
<button class="answer blue"></button>
<button class="answer yellow"></button>
<button class="answer green"></button>
</div>

<div id="score">Punkte: 0</div>
<div id="level">Level: 1</div>

</div>

<!-- WIN SCREEN -->

<div id="winScreen">

<div id="trophy">🏆</div>

<div id="gift">🎁</div>

<div id="reward"></div>

</div>

<script>

let score=0
let level=1
let current=0

const quiz=[

{q:"Was versteht man unter einer Gesellschaft?",a:["Eine Gemeinschaft von Menschen","Eine Maschine","Ein Gebäude","Eine Armee"],c:0},

{q:"Was teilen Menschen in einer Gesellschaft?",a:["Regeln und Werte","Nur Kleidung","Nur Essen","Nur Geld"],c:0},

{q:"Warum sind Menschen voneinander abhängig?",a:["Wegen Arbeit und Familie","Wegen Wetter","Wegen Autos","Wegen Spiele"],c:0},

{q:"Wie leben Menschen zusammen?",a:["Durch Zusammenarbeit","Gar nicht","Durch Zufall","Durch Glück"],c:0},

{q:"Was gibt es in einer Gesellschaft?",a:["Regeln und Gesetze","Keine Regeln","Nur Chaos","Nur Spiele"],c:0},

{q:"Warum ist Kommunikation wichtig?",a:["Damit Menschen sich verstehen","Damit man schreit","Damit man gewinnt","Damit man rennt"],c:0},

{q:"Was haben Menschen in einer Gesellschaft?",a:["Rechte und Pflichten","Nur Rechte","Nur Pflichten","Gar nichts"],c:0},

{q:"Wie werden Konflikte gelöst?",a:["Durch Regeln oder Gerichte","Durch Kämpfen","Durch Rennen","Durch Ignorieren"],c:0},

{q:"Welche Rollen können Menschen haben?",a:["Schüler, Arbeitnehmer, Eltern","Nur Schüler","Nur Lehrer","Keine Rollen"],c:0},

{q:"Wie arbeiteten Menschen vor der Industrialisierung?",a:["In der Landwirtschaft","In Büros","Mit Robotern","Mit Computern"],c:0},

{q:"Wo lebten viele Menschen früher?",a:["Auf dem Land","Im Weltraum","Im Meer","In Flugzeugen"],c:0},

{q:"Wie wurden Produkte früher hergestellt?",a:["Von Hand","Mit Robotern","Mit Computern","Mit Lasern"],c:0}

]

quiz.sort(()=>Math.random()-0.5)

const buttons=document.querySelectorAll(".answer")

function loadQuestion(){

if(current>=quiz.length){

win()

return

}

let q=quiz[current]

document.getElementById("question").innerText=q.q

buttons.forEach((b,i)=>{

b.innerText=q.a[i]

b.onclick=()=>answer(i,q.c)

})

}

function answer(i,c){

if(i===c){

buttons[i].classList.add("correct")

score+=100

}else{

buttons[i].classList.add("wrong")

}

setTimeout(()=>{

buttons.forEach(b=>{

b.classList.remove("correct")
b.classList.remove("wrong")

})

document.getElementById("score").innerText="Punkte: "+score

current++

loadQuestion()

},800)

}

function win(){

document.getElementById("quiz").style.display="none"

document.getElementById("winScreen").style.display="flex"

}

/* TROPHY CLICK */

const trophy=document.getElementById("trophy")
const gift=document.getElementById("gift")
const reward=document.getElementById("reward")

trophy.onclick=()=>{

gift.style.display="block"

gift.animate([
{transform:"translateY(-200px) scale(0.5)"},
{transform:"translateY(0) scale(1.3)"},
{transform:"scale(1)"}
],{
duration:800
})

startShake()

}

/* GESCHENK ÖFFNEN */

gift.onclick=()=>{

const rewards=[
"⭐ +500 XP Bonus!",
"💰 +1000 Bonus Punkte!",
"🎉 Super Spieler!",
"🏅 Meister Quiz!"
]

let r=rewards[Math.floor(Math.random()*rewards.length)]

reward.innerText=r

reward.style.display="block"

}

/* RANDOM SHAKE */

function startShake(){

setInterval(()=>{

if(Math.random()<0.4){

gift.classList.add("shake")

setTimeout(()=>{
gift.classList.remove("shake")
},400)

}

},2000)

}

loadQuestion()

</script>

</body>
</html>
```
