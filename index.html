<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Super Quiz</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#app{
width:95%;
max-width:950px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:fade 0.6s;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

h1{
font-size:40px;
margin-bottom:10px;
}

button{
border:none;
padding:18px;
border-radius:14px;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:0.25s;
}

button:hover{
transform:scale(1.1);
}

input{
padding:12px;
border-radius:10px;
border:none;
margin:5px;
}

.answerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:30px;
}

.answerBtn{
height:120px;
font-size:40px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
}

.answerBtn:nth-child(1){background:#e21b3c;}
.answerBtn:nth-child(2){background:#1368ce;}
.answerBtn:nth-child(3){background:#d89e00;color:black;}
.answerBtn:nth-child(4){background:#26890c;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

#timer{
font-size:45px;
margin:10px;
}

.player{
background:rgba(255,255,255,0.1);
margin:5px;
padding:10px;
border-radius:10px;
font-size:20px;
}

.leader{
font-size:24px;
margin:10px;
padding:15px;
background:rgba(255,255,255,0.1);
border-radius:12px;
}

.win{
font-size:55px;
animation:pop 1s;
}

@keyframes pop{
0%{transform:scale(0)}
60%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.confetti{
position:absolute;
width:12px;
height:12px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(720deg)}
}

</style>

</head>

<body>

<div id="app"></div>

<script>

/* SOUNDS */

const correctSound=new Audio("https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3");
const wrongSound=new Audio("https://assets.mixkit.co/active_storage/sfx/294/294-preview.mp3");
const winSound=new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3");

/* FRAGEN */

let quiz=[

{
question:"Was versteht man unter einer Gesellschaft?",
correct:0
},

{
question:"Was teilen Menschen in einer Gesellschaft?",
correct:0
},

{
question:"Warum sind Menschen voneinander abhängig?",
correct:0
},

{
question:"Wie arbeiten Menschen zusammen?",
correct:0
},

{
question:"Was löst Konflikte in einer Gesellschaft?",
correct:0
},

{
question:"Welche Rolle kann jemand haben?",
correct:0
},

{
question:"Wo arbeiteten viele Menschen früher?",
correct:0
},

{
question:"Wie wurden Produkte früher hergestellt?",
correct:0
}

];

/* SPIELER */

let players=[];
let currentPlayer=0;
let questionIndex=0;
let timer;
let timeLeft=15;

const app=document.getElementById("app");

function start(){

app.innerHTML=`

<h1>Gesellschaft Quiz</h1>

<h3>Spieler hinzufügen</h3>

<div id="playerList"></div>

<input id="name" placeholder="Name">

<button onclick="addPlayer()">Spieler hinzufügen</button>

<br><br>

<button onclick="startQuiz()">Quiz starten</button>

`;

}

function addPlayer(){

let name=document.getElementById("name").value;

if(!name)return;

players.push({name:name,score:0});

renderPlayers();

document.getElementById("name").value="";

}

function renderPlayers(){

let html="";

players.forEach(p=>{

html+=`<div class="player">${p.name}</div>`

});

document.getElementById("playerList").innerHTML=html;

}

function startQuiz(){

quiz = quiz.sort(()=>Math.random()-0.5);

questionIndex=0;
currentPlayer=0;

nextTurn();

}

function nextTurn(){

if(questionIndex>=quiz.length){

showLeaderboard();
return;

}

if(currentPlayer>=players.length){

currentPlayer=0;
questionIndex++;

nextTurn();
return;

}

let q=quiz[questionIndex];

timeLeft=15;

app.innerHTML=`

<h2>${players[currentPlayer].name} ist dran</h2>

<div id="timer">${timeLeft}</div>

<h2>${q.question}</h2>

<div class="answerGrid">

<button class="answerBtn" onclick="answer(0,this)">🔺</button>
<button class="answerBtn" onclick="answer(1,this)">🔷</button>
<button class="answerBtn" onclick="answer(2,this)">⭕</button>
<button class="answerBtn" onclick="answer(3,this)">⭐</button>

</div>

`;

timer=setInterval(()=>{

timeLeft--;
document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

currentPlayer++;
nextTurn();

}

},1000);

}

function answer(i,btn){

clearInterval(timer);

let correct=quiz[questionIndex].correct;

let buttons=document.querySelectorAll(".answerBtn");

buttons.forEach((b,index)=>{

if(index===correct)b.classList.add("correct");

if(index===i && i!==correct)b.classList.add("wrong");

});

if(i===correct){

players[currentPlayer].score+=timeLeft*10;

correctSound.play();

}else{

wrongSound.play();

}

setTimeout(()=>{

currentPlayer++;
nextTurn();

},1200);

}

function showLeaderboard(){

players.sort((a,b)=>b.score-a.score);

let html="<h1 class='win'>🏆 Gewinner</h1>";

players.forEach((p,i)=>{

let medal="";

if(i===0)medal="🥇";
if(i===1)medal="🥈";
if(i===2)medal="🥉";

html+=`<div class="leader">${medal} ${p.name} — ${p.score}</div>`;

});

html+=`<br><button onclick="start()">Neues Spiel</button>`;

app.innerHTML=html;

winSound.play();

confetti();

}

function confetti(){

for(let i=0;i<250;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=`hsl(${Math.random()*360},80%,60%)`;

c.style.animationDuration=2+Math.random()*3+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

start();

</script>

</body>
</html>
