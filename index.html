<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#quiz{
max-width:900px;
margin:auto;
padding:20px;
}

#question{
font-size:30px;
margin:30px 0;
min-height:60px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.answer{
padding:25px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
color:white;
transition:0.2s;
box-shadow:0 8px 0 rgba(0,0,0,0.3);
}

.answer:hover{
transform:scale(1.05);
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;color:black;}
.green{background:#2ecc71;}

.correct{
background:#27ae60 !important;
}

.wrong{
background:#c0392b !important;
}

#score,#level,#timer{
font-size:22px;
margin-top:10px;
}

#progressBar{
width:100%;
height:15px;
background:rgba(255,255,255,0.3);
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

#progress{
height:100%;
width:0%;
background:#2ecc71;
}

#gift{
display:none;
margin-top:25px;
font-size:28px;
cursor:pointer;
animation:giftAnim 1s infinite alternate;
}

@keyframes giftAnim{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

#giftCard{
display:none;
margin-top:20px;
background:white;
color:black;
padding:25px;
border-radius:15px;
font-size:24px;
}

#startMusic{
margin-top:20px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Gesellschaft Quiz</h1>

<div id="quiz">

<button id="startMusic">🎵 Musik starten</button>

<div id="question"></div>

<div class="answers">
<button class="answer red"></button>
<button class="answer blue"></button>
<button class="answer yellow"></button>
<button class="answer green"></button>
</div>

<div id="timer">Zeit: 15</div>

<div id="score">Punkte: 0</div>
<div id="level">Level: 1</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="gift">🎁 Geschenk öffnen</div>
<div id="giftCard">🧠 Super! Du hast gut aufgepasst!</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c51c6b7d3.mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

let score=0
let level=1
let current=0
let time=15
let timer

const quiz=[
{q:"Was versteht man unter einer Gesellschaft?",a:["Eine Gemeinschaft von Menschen","Eine Maschine","Ein Gebäude","Eine Armee"],c:0},
{q:"Was teilen Menschen in einer Gesellschaft?",a:["Regeln und Werte","Nur Kleidung","Nur Essen","Nur Geld"],c:0},
{q:"Warum sind Menschen voneinander abhängig?",a:["Wegen Arbeit und Familie","Wegen Wetter","Wegen Autos","Wegen Spiele"],c:0},
{q:"Wie leben Menschen zusammen?",a:["Durch Zusammenarbeit","Gar nicht","Durch Zufall","Durch Glück"],c:0},
{q:"Was gibt es in einer Gesellschaft?",a:["Regeln und Gesetze","Keine Regeln","Nur Chaos","Nur Spiele"],c:0},
{q:"Warum ist Kommunikation wichtig?",a:["Damit Menschen sich verstehen","Damit man schreit","Damit man gewinnt","Damit man rennt"],c:0},
{q:"Was haben Menschen in einer Gesellschaft?",a:["Rechte und Pflichten","Nur Rechte","Nur Pflichten","Gar nichts"],c:0}
]

quiz.sort(()=>Math.random()-0.5)

const buttons=document.querySelectorAll(".answer")

document.getElementById("startMusic").onclick=()=>{
document.getElementById("music").play()
}

function startTimer(){

time=15
document.getElementById("timer").innerText="Zeit: "+time

timer=setInterval(()=>{

time--
document.getElementById("timer").innerText="Zeit: "+time

if(time<=0){
clearInterval(timer)
nextQuestion()
}

},1000)

}

function shuffleAnswers(question){

let answers=question.a.map((text,i)=>({
text:text,
correct:i===question.c
}))

answers.sort(()=>Math.random()-0.5)

return{
q:question.q,
a:answers.map(a=>a.text),
c:answers.findIndex(a=>a.correct)
}

}

function loadQuestion(){

if(current>=quiz.length){
win()
return
}

updateProgress()

let q=shuffleAnswers(quiz[current])

document.getElementById("question").innerText=q.q

buttons.forEach((b,i)=>{
b.innerText=q.a[i]
b.onclick=()=>answer(i,q.c)
})

startTimer()

}

function answer(i,correct){

clearInterval(timer)

if(i===correct){

buttons[i].classList.add("correct")
score+=100

}else{

buttons[i].classList.add("wrong")
buttons[correct].classList.add("correct")

}

setTimeout(nextQuestion,900)

}

function nextQuestion(){

buttons.forEach(b=>{
b.classList.remove("correct")
b.classList.remove("wrong")
})

document.getElementById("score").innerText="Punkte: "+score

if(score>=level*500){
level++
document.getElementById("level").innerText="Level: "+level
}

if(score>=800){
document.getElementById("gift").style.display="block"
}

current++
loadQuestion()

}

document.getElementById("gift").onclick=()=>{
document.getElementById("giftCard").style.display="block"
}

function updateProgress(){

let percent=(current/quiz.length)*100
document.getElementById("progress").style.width=percent+"%"

}

function win(){

let highscore=localStorage.getItem("quizHighscore")||0

if(score>highscore){
localStorage.setItem("quizHighscore",score)
highscore=score
}

document.getElementById("quiz").innerHTML=`
<h1>🏆 Gewonnen!</h1>
<h2>Punkte: ${score}</h2>
<h3>Highscore: ${highscore}</h3>
<button onclick="location.reload()">🔄 Nochmal spielen</button>
`

confetti()

}

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<200;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:8,
speed:Math.random()*3+2
})
}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,p.size,p.size)
p.y+=p.speed
if(p.y>canvas.height)p.y=0
})

requestAnimationFrame(update)

}

update()

}

loadQuestion()

</script>

</body>
</html>
