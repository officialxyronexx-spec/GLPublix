```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#quiz{
max-width:900px;
margin:auto;
padding:20px;
}

#question{
font-size:28px;
margin:30px;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.answer{
padding:25px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
color:white;
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;color:black;}
.green{background:#2ecc71;}

.correct{background:#27ae60!important;}
.wrong{background:#c0392b!important;}

#score{
font-size:22px;
margin-top:10px;
}

#timer{
font-size:20px;
margin-top:10px;
}

/* WIN SCREEN */

#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
z-index:1000;
}

#trophy{
font-size:120px;
cursor:pointer;
animation:trophyRise 2s ease-out forwards;
}

@keyframes trophyRise{

0%{
transform:translateY(400px) scale(0.3);
opacity:0;
}

100%{
transform:translateY(0) scale(1);
opacity:1;
}

}

#gift{
font-size:100px;
margin-top:40px;
display:none;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{

0%{transform:translateX(0)}
25%{transform:translateX(-10px)}
50%{transform:translateX(10px)}
75%{transform:translateX(-10px)}
100%{transform:translateX(0)}

}

#restart{
margin-top:40px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🌍 Gesellschaft Quiz</h1>

<div id="quiz">

<div id="question"></div>

<div class="answers">
<button class="answer red"></button>
<button class="answer blue"></button>
<button class="answer yellow"></button>
<button class="answer green"></button>
</div>

<div id="timer">Zeit: 10</div>

<div id="score">Punkte: 0</div>

</div>

<div id="winScreen">

<div id="trophy">🏆</div>

<div id="gift">🎁</div>

<button id="restart" onclick="location.reload()">Nochmal spielen</button>

</div>

<script>

let score=0
let current=0
let time=10
let timer

const quiz=[

{q:"Was ist eine Gesellschaft?",a:["Gemeinschaft von Menschen","Auto","Haus","Computer"],c:0},

{q:"Was teilen Menschen?",a:["Regeln und Werte","Nur Kleidung","Nur Geld","Nur Essen"],c:0},

{q:"Warum arbeiten Menschen zusammen?",a:["Um Bedürfnisse zu erfüllen","Zum Spaß","Ohne Grund","Nie"],c:0},

{q:"Was regelt das Zusammenleben?",a:["Gesetze","Chaos","Zufall","Gar nichts"],c:0},

{q:"Was bedeutet Kommunikation?",a:["Information austauschen","Schlafen","Rennen","Spielen"],c:0}

]

quiz.sort(()=>Math.random()-0.5)

const buttons=document.querySelectorAll(".answer")

function loadQuestion(){

if(current>=quiz.length){

win()

return

}

let q=quiz[current]

document.getElementById("question").innerText=q.q

buttons.forEach((b,i)=>{

b.innerText=q.a[i]

b.onclick=()=>answer(i,q.c)

})

startTimer()

}

function startTimer(){

time=10

document.getElementById("timer").innerText="Zeit: "+time

timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="Zeit: "+time

if(time<=0){

clearInterval(timer)

nextQuestion()

}

},1000)

}

function answer(i,c){

clearInterval(timer)

if(i===c){

buttons[i].classList.add("correct")

score+=100

}else{

buttons[i].classList.add("wrong")

buttons[c].classList.add("correct")

}

setTimeout(nextQuestion,800)

}

function nextQuestion(){

buttons.forEach(b=>{

b.classList.remove("correct")

b.classList.remove("wrong")

})

document.getElementById("score").innerText="Punkte: "+score

current++

loadQuestion()

}

function win(){

document.getElementById("quiz").style.display="none"

document.getElementById("winScreen").style.display="flex"

}

/* TROPHY CLICK */

const trophy=document.getElementById("trophy")
const gift=document.getElementById("gift")

trophy.onclick=()=>{

gift.style.display="block"

gift.animate([
{transform:"translateY(-200px) scale(0.4)"},
{transform:"translateY(0) scale(1.3)"},
{transform:"scale(1)"}
],{
duration:800
})

startShake()

}

/* RANDOM SHAKE */

function startShake(){

setInterval(()=>{

if(Math.random()<0.4){

gift.classList.add("shake")

setTimeout(()=>{
gift.classList.remove("shake")
},400)

}

},2000)

}

loadQuestion()

</script>

</body>
</html>
```
