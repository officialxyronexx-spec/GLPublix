<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#app{
width:90%;
max-width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

h1{
font-size:42px;
margin-bottom:10px;
}

button{
border:none;
padding:18px;
border-radius:14px;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:0.25s;
}

button:hover{
transform:scale(1.08);
}

.answerGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:30px;
}

.answerBtn{
padding:25px;
font-size:18px;
border-radius:15px;
color:white;
}

.answerBtn:nth-child(1){background:#e21b3c;}
.answerBtn:nth-child(2){background:#1368ce;}
.answerBtn:nth-child(3){background:#d89e00;color:black;}
.answerBtn:nth-child(4){background:#26890c;}

#timer{
font-size:45px;
margin:15px;
font-weight:bold;
}

.progress{
opacity:0.8;
}

.score{
font-size:22px;
margin-top:10px;
}

/* Gewinner Animation */

.win{
font-size:50px;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0);}
60%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* Konfetti */

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div id="app"></div>

<script>

const quiz=[

{
question:"Was versteht man unter einer Gesellschaft?",
answers:[
"Eine Gemeinschaft von Menschen",
"Eine Maschine",
"Ein Gebäude",
"Eine Firma"
],
correct:0
},

{
question:"Was teilen Menschen in einer Gesellschaft?",
answers:[
"Regeln, Werte und Normen",
"Nur Geld",
"Nur Kleidung",
"Nur Essen"
],
correct:0
},

{
question:"Warum sind Menschen in einer Gesellschaft voneinander abhängig?",
answers:[
"Weil sie zusammen arbeiten und leben",
"Weil sie gleich aussehen",
"Weil sie alleine leben",
"Weil sie keine Regeln haben"
],
correct:0
},

{
question:"Wie arbeiten Menschen in einer Gesellschaft zusammen?",
answers:[
"Durch Zusammenarbeit und Arbeitsteilung",
"Gar nicht",
"Nur durch Wettbewerb",
"Nur alleine"
],
correct:0
},

{
question:"Was hilft Konflikte zu lösen?",
answers:[
"Regeln und Gerichte",
"Schreien",
"Gar nichts",
"Zufall"
],
correct:0
},

{
question:"Welche Rolle kann jemand haben?",
answers:[
"Schüler oder Arbeitnehmer",
"Nur Zuschauer",
"Nur Chef",
"Keine Rolle"
],
correct:0
},

{
question:"Wie arbeiteten Menschen vor der Industriellen Revolution?",
answers:[
"In der Landwirtschaft",
"In großen Fabriken",
"In Büros",
"Mit Robotern"
],
correct:0
},

{
question:"Wie wurden Produkte früher hergestellt?",
answers:[
"Von Hand in kleinen Werkstätten",
"Mit Robotern",
"In riesigen Fabriken",
"Gar nicht"
],
correct:0
}

];

let questionIndex=0;
let score=0;
let timer;
let timeLeft=15;

const app=document.getElementById("app");

function start(){

app.innerHTML=`

<h1>Gesellschaft Quiz</h1>

<p>Teste dein Wissen</p>

<button onclick="startQuiz()">Quiz starten</button>

`;

}

function startQuiz(){

questionIndex=0;
score=0;

nextQuestion();

}

function nextQuestion(){

if(questionIndex>=quiz.length){
showResult();
return;
}

let q=quiz[questionIndex];
timeLeft=15;

app.innerHTML=`

<div class="progress">Frage ${questionIndex+1} / ${quiz.length}</div>

<div id="timer">${timeLeft}</div>

<h2>${q.question}</h2>

<div class="answerGrid" id="answers"></div>

<div class="score">Punkte: ${score}</div>

`;

q.answers.forEach((a,i)=>{

let btn=document.createElement("button");

btn.className="answerBtn";

btn.innerText=a;

btn.onclick=()=>answer(i);

document.getElementById("answers").appendChild(btn);

});

timer=setInterval(()=>{

timeLeft--;
document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){

clearInterval(timer);
questionIndex++;
nextQuestion();

}

},1000);

}

function answer(i){

clearInterval(timer);

let correct=quiz[questionIndex].correct;

if(i===correct){

score+=timeLeft*10;

}

questionIndex++;

setTimeout(nextQuestion,600);

}

function showResult(){

app.innerHTML=`

<h1 class="win">🏆 Quiz beendet!</h1>

<h2>Deine Punkte</h2>

<h1>${score}</h1>

<button onclick="start()">Nochmal spielen</button>

`;

confetti();

}

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=`hsl(${Math.random()*360},80%,60%)`;

c.style.animationDuration=2+Math.random()*3+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

start();

</script>

</body>
</html>
