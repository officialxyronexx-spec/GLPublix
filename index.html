<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:20px;
}

#quiz{
max-width:900px;
margin:auto;
padding:20px;
}

#question{
font-size:28px;
margin:40px 0;
}

.answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.answer{
padding:25px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
color:white;
transition:0.2s;
box-shadow:0 8px 0 rgba(0,0,0,0.3);
}

.answer:active{
transform:translateY(4px);
box-shadow:0 4px 0 rgba(0,0,0,0.3);
}

.red{background:#e74c3c;}
.blue{background:#3498db;}
.yellow{background:#f1c40f;color:black;}
.green{background:#2ecc71;}

.correct{
animation:correctFlash 0.5s 4;
}

.wrong{
animation:wrongFlash 0.5s 4;
}

@keyframes correctFlash{
0%{background:#2ecc71;}
50%{background:white;color:black;}
100%{background:#2ecc71;}
}

@keyframes wrongFlash{
0%{background:#e74c3c;}
50%{background:black;}
100%{background:#e74c3c;}
}

#score{
font-size:24px;
margin-top:20px;
}

#level{
font-size:18px;
margin-top:10px;
}

#gift{
display:none;
margin-top:30px;
font-size:30px;
animation:giftAnim 1s infinite alternate;
}

@keyframes giftAnim{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

#giftCard{
display:none;
margin-top:20px;
background:white;
color:black;
padding:30px;
border-radius:15px;
font-size:24px;
animation:cardPop 0.6s;
}

@keyframes cardPop{
from{transform:scale(0)}
to{transform:scale(1)}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>Gesellschaft Quiz</h1>

<div id="quiz">

<div id="question"></div>

<div class="answers">
<button class="answer red" id="a0"></button>
<button class="answer blue" id="a1"></button>
<button class="answer yellow" id="a2"></button>
<button class="answer green" id="a3"></button>
</div>

<div id="score">Punkte: 0</div>
<div id="level">Level: 1</div>

<div id="gift">🎁 Geschenk öffnen!</div>
<div id="giftCard">🧠 Du hast gut aufgepasst!</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c51c6b7d3.mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

let score=0
let level=1
let current=0

const quiz=[
{
q:"Was versteht man unter einer Gesellschaft?",
a:["Eine Gemeinschaft von Menschen","Eine Maschine","Ein Gebäude","Eine Armee"],
c:0
},
{
q:"Was teilen Menschen in einer Gesellschaft?",
a:["Regeln und Werte","Nur Kleidung","Nur Essen","Nur Geld"],
c:0
},
{
q:"Warum sind Menschen voneinander abhängig?",
a:["Wegen Arbeit und Familie","Wegen Wetter","Wegen Autos","Wegen Spiele"],
c:0
},
{
q:"Wie leben Menschen zusammen?",
a:["Durch Zusammenarbeit","Gar nicht","Durch Zufall","Durch Glück"],
c:0
},
{
q:"Was gibt es in einer Gesellschaft?",
a:["Regeln und Gesetze","Keine Regeln","Nur Chaos","Nur Spiele"],
c:0
},
{
q:"Warum ist Kommunikation wichtig?",
a:["Damit Menschen sich verstehen","Damit man schreit","Damit man gewinnt","Damit man rennt"],
c:0
},
{
q:"Was haben Menschen in einer Gesellschaft?",
a:["Rechte und Pflichten","Nur Rechte","Nur Pflichten","Gar nichts"],
c:0
},
{
q:"Wie werden Konflikte gelöst?",
a:["Durch Regeln oder Gerichte","Durch Kämpfen","Durch Rennen","Durch Ignorieren"],
c:0
},
{
q:"Welche Rollen können Menschen haben?",
a:["Schüler, Arbeitnehmer, Eltern","Nur Schüler","Nur Lehrer","Keine Rollen"],
c:0
},
{
q:"Wie arbeiteten Menschen vor der Industrialisierung?",
a:["In der Landwirtschaft","In Büros","Mit Robotern","Mit Computern"],
c:0
},
{
q:"Wo lebten viele Menschen früher?",
a:["Auf dem Land","Im Weltraum","Im Meer","In Flugzeugen"],
c:0
},
{
q:"Wie wurden Produkte früher hergestellt?",
a:["Von Hand","Mit Robotern","Mit Computern","Mit Lasern"],
c:0
}
]

quiz.sort(()=>Math.random()-0.5)

const buttons=[
document.getElementById("a0"),
document.getElementById("a1"),
document.getElementById("a2"),
document.getElementById("a3")
]

function loadQuestion(){

if(current>=quiz.length){
win()
return
}

const q=quiz[current]

document.getElementById("question").innerText=q.q

buttons.forEach((b,i)=>{
b.innerText=q.a[i]
b.onclick=()=>answer(i)
})

}

function answer(i){

const q=quiz[current]

if(i===q.c){

buttons[i].classList.add("correct")

score+=100

}else{

buttons[i].classList.add("wrong")

}

setTimeout(()=>{

buttons.forEach(b=>{
b.classList.remove("correct")
b.classList.remove("wrong")
})

document.getElementById("score").innerText="Punkte: "+score

if(score>=level*500){
level++
document.getElementById("level").innerText="Level: "+level
}

if(score>=1000){
document.getElementById("gift").style.display="block"
document.getElementById("gift").onclick=openGift
}

current++
loadQuestion()

},800)

}

function openGift(){

document.getElementById("giftCard").style.display="block"

}

function win(){

document.getElementById("quiz").innerHTML="<h1>🏆 Gewonnen!</h1><h2>Punkte: "+score+"</h2>"

confetti()

}

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<200;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:10,
speed:Math.random()*3+2
})
}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{
ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)"
ctx.fillRect(p.x,p.y,p.size,p.size)
p.y+=p.speed
if(p.y>canvas.height)p.y=0
})

requestAnimationFrame(update)

}

update()

}

document.getElementById("music").play()

loadQuestion()

</script>

</body>
</html>
