<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrialisierungs Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
    margin:0;
}

.container {
    padding:20px;
}

button {
    padding:15px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

input {
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
    margin:5px;
}

.answerBtn {
    display:block;
    width:80%;
    margin:10px auto;
}

</style>
</head>
<body>

<div class="container" id="app"></div>

<script>

const HOST_EMAIL = "officialxyronexx@gmail.com";
let gameCode = "";
let currentQuestion = 0;
let score = 0;
let players = [];

const quiz = [
{
question: "Was ist eine Gesellschaft?",
answers: [
"Gemeinschaft von Menschen",
"Maschine",
"Firma",
"Armee"
],
correct: 0
},
{
question: "Wie arbeiteten Menschen vor der Industrialisierung?",
answers: [
"In der Landwirtschaft",
"In Büros",
"Mit Robotern",
"Im Internet"
],
correct: 0
}
];

// ===== START SCREEN =====
function showStart() {
document.getElementById("app").innerHTML = `
<h1>Gesellschaft Quiz</h1>
<button onclick="showHostLogin()">Host</button>
<button onclick="showPlayerJoin()">Spieler</button>
`;
}

// ===== HOST LOGIN =====
function showHostLogin() {
document.getElementById("app").innerHTML = `
<h2>Host Login</h2>
<input id="email" placeholder="E-Mail eingeben">
<br>
<button onclick="checkHost()">Einloggen</button>
`;
}

function checkHost() {
let email = document.getElementById("email").value;
if(email === HOST_EMAIL){
createGame();
}else{
alert("Du bist nicht der Host!");
showStart();
}
}

// ===== GAME CREATION =====
function createGame(){
gameCode = Math.floor(100000 + Math.random() * 900000);
localStorage.setItem("gameCode", gameCode);
localStorage.setItem("players", JSON.stringify([]));

document.getElementById("app").innerHTML = `
<h2>Spiel erstellt</h2>
<p>Spielcode:</p>
<h1>${gameCode}</h1>
<p>Teile diesen Code mit deiner Klasse.</p>
<button onclick="startGame()">Quiz starten</button>
`;
}

// ===== PLAYER JOIN =====
function showPlayerJoin(){
document.getElementById("app").innerHTML = `
<h2>Spiel beitreten</h2>
<input id="name" placeholder="Name">
<input id="code" placeholder="Code">
<br>
<button onclick="joinGame()">Beitreten</button>
`;
}

function joinGame(){
let name = document.getElementById("name").value;
let code = document.getElementById("code").value;

if(code == localStorage.getItem("gameCode")){
players = JSON.parse(localStorage.getItem("players")) || [];
players.push({name:name,score:0});
localStorage.setItem("players", JSON.stringify(players));
alert("Erfolgreich beigetreten! Warte bis Host startet.");
}else{
alert("Falscher Code!");
}
}

// ===== QUIZ START =====
function startGame(){
currentQuestion = 0;
showQuestion();
}

function showQuestion(){
let q = quiz[currentQuestion];

document.getElementById("app").innerHTML = `
<h2>${q.question}</h2>
<div id="answers"></div>
`;

q.answers.forEach((a,i)=>{
let btn = document.createElement("button");
btn.className = "answerBtn";
btn.innerText = a;
btn.onclick = ()=>selectAnswer(i);
document.getElementById("answers").appendChild(btn);
});
}

function selectAnswer(index){
let q = quiz[currentQuestion];
if(index === q.correct){
score += 100;
}
nextQuestion();
}

function nextQuestion(){
currentQuestion++;
if(currentQuestion < quiz.length){
showQuestion();
}else{
endGame();
}
}

function endGame(){
document.getElementById("app").innerHTML = `
<h2>Quiz beendet</h2>
<p>Host kann jetzt Ergebnisse zeigen.</p>
<button onclick="showResults()">Ergebnisse anzeigen</button>
`;
}

function showResults(){
players = JSON.parse(localStorage.getItem("players")) || [];
let resultHTML = players.map(p=>`<p>${p.name}</p>`).join("");
document.getElementById("app").innerHTML = `
<h2>Spieler</h2>
${resultHTML}
`;
}

showStart();

</script>

</body>
</html>
