<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesellschaft Quiz</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

#container {
    padding: 20px;
}

h1 {
    margin-top: 20px;
}

#timer {
    font-size: 30px;
    margin: 20px 0;
}

#answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    max-width: 600px;
    margin: auto;
}

button {
    padding: 20px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    color: white;
}

button:nth-child(1) { background: #e74c3c; }
button:nth-child(2) { background: #3498db; }
button:nth-child(3) { background: #f1c40f; color: black; }
button:nth-child(4) { background: #2ecc71; }

#startBtn {
    background: black;
    margin-top: 30px;
}

#leaderboard {
    margin-top: 20px;
}
</style>
</head>
<body>

<div id="container">
    <h1>Gesellschaft & Industrielle Revolution</h1>
    <div id="game"></div>
</div>

<script>
const quiz = [
{
question: "Was versteht man unter Gesellschaft?",
answers: [
"Gemeinschaft von Menschen",
"Eine Maschine",
"Ein Unternehmen",
"Ein Königreich"
],
correct: 0
},
{
question: "Wie lebten die meisten Menschen vor der Industrialisierung?",
answers: [
"In Großstädten",
"In Fabriken",
"Auf dem Land als Bauern",
"In Büros"
],
correct: 2
},
{
question: "Warum zogen viele Menschen in Städte?",
answers: [
"Urlaub",
"Fabrikarbeit",
"Sport",
"Abenteuer"
],
correct: 1
},
{
question: "Welche neue soziale Gruppe entstand?",
answers: [
"Ritter",
"Arbeiterklasse",
"Pharaonen",
"Gladiatoren"
],
correct: 1
}
];

let currentQuestion = 0;
let score = 0;
let timeLeft = 10;
let timer;
let playerName = "";

function startGame() {
    playerName = document.getElementById("nameInput").value;
    if(playerName === "") return alert("Bitte Namen eingeben!");
    score = 0;
    currentQuestion = 0;
    loadQuestion();
}

function loadQuestion() {
    timeLeft = 10;
    document.getElementById("game").innerHTML = `
        <div id="timer">${timeLeft}</div>
        <h2>${quiz[currentQuestion].question}</h2>
        <div id="answers"></div>
    `;

    const answersDiv = document.getElementById("answers");

    quiz[currentQuestion].answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.innerText = answer;
        button.onclick = () => selectAnswer(index);
        answersDiv.appendChild(button);
    });

    startTimer();
}

function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if(timeLeft === 0) {
            clearInterval(timer);
            nextQuestion();
        }
    }, 1000);
}

function selectAnswer(index) {
    clearInterval(timer);
    if(index === quiz[currentQuestion].correct) {
        score += timeLeft * 10;
    }
    nextQuestion();
}

function nextQuestion() {
    currentQuestion++;
    if(currentQuestion < quiz.length) {
        loadQuestion();
    } else {
        endGame();
    }
}

function endGame() {
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
    leaderboard.push({name: playerName, score});
    leaderboard.sort((a,b) => b.score - a.score);
    leaderboard = leaderboard.slice(0,5);
    localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

    document.getElementById("game").innerHTML = `
        <h2>Quiz beendet!</h2>
        <h3>${playerName}, dein Score: ${score}</h3>
        <div id="leaderboard">
            <h3>Top 5</h3>
            ${leaderboard.map(p => `<p>${p.name}: ${p.score}</p>`).join("")}
        </div>
        <button id="startBtn" onclick="location.reload()">Neustart</button>
    `;
}

document.getElementById("game").innerHTML = `
    <input id="nameInput" placeholder="Dein Name" style="padding:10px;font-size:16px;border-radius:8px;border:none;">
    <br>
    <button id="startBtn" onclick="startGame()">Spiel starten</button>
`;
</script>

</body>
</html>
